<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page('Payment', ~{::content})}">
<section th:fragment="content" class="page-container" data-page-mode="content">
    <section class="surface-card dashboard-hero my-4 my-lg-5">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <span class="eyebrow">Payment</span>
                <h1 class="h2 mt-3 mb-2">Complete your booking payment.</h1>
                <p class="text-body-secondary mb-0">This is a simulated payment flow. No external gateway is involved.</p>
            </div>
            <span class="status-pill status-pill--primary">Tenant checkout</span>
        </div>
    </section>

    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="surface-card p-4 p-lg-5">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label">Property Name</label>
                        <input class="form-control" type="text" th:value="${payment.propertyName}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Landlord Name</label>
                        <input class="form-control" type="text" th:value="${payment.landlordName}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Tenant Name</label>
                        <input class="form-control" type="text" th:value="${payment.tenantName}" readonly>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Amount</label>
                        <input class="form-control" type="text"
                               th:value="${'INR ' + #numbers.formatDecimal(payment.amount, 0, 'COMMA', 2, 'POINT')}"
                               readonly>
                    </div>
                </div>

                <form th:action="@{/payments}" method="post" class="mt-4 d-flex justify-content-end gap-3">
                    <input type="hidden" name="bookingId" th:value="${payment.bookingId}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <a class="btn btn-soft" th:href="@{/tenant/payments}">Cancel</a>
                    <button class="btn btn-brand" type="submit">Pay now</button>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
