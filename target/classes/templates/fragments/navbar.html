<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-light py-3">
        <a class="navbar-brand brand-mark" th:href="@{/}">
            <span class="brand-mark__chip">R</span>
            <span class="brand-mark__text" th:text="${appName}">Rentify</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-3 mb-lg-0">
                <th:block th:if="${currentUser == null}">
                    <li class="nav-item"><a class="nav-link" th:href="@{/rooms}">Explore</a></li>
                </th:block>

                <th:block th:if="${currentUser != null and currentUser.role.name() == 'TENANT'}">
                    <li class="nav-item"><a class="nav-link" th:href="@{/tenant/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/tenant/properties}">Browse Properties</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/tenant/bookings}">My Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/tenant/payments}">Payments</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{'/profiles/' + ${currentUser.username}}">Profile</a></li>
                </th:block>

                <th:block th:if="${currentUser != null and currentUser.role.name() == 'LANDLORD'}">
                    <li class="nav-item"><a class="nav-link" th:href="@{/landlord/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/landlord/create-property}">Create Listing</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/landlord/properties}">My Properties</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/landlord/bookings}">Booking Requests</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/landlord/dashboard}">Revenue</a></li>
                </th:block>

                <th:block th:if="${currentUser != null and currentUser.role.name() == 'ADMIN'}">
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}">Users</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/properties}">Properties</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/bookings}">Bookings</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin-dashboard}">Analytics</a></li>
                </th:block>
            </ul>

            <div class="nav-actions d-flex align-items-center gap-2">
                <th:block th:if="${currentUser == null}">
                    <a class="btn btn-soft btn-sm" th:href="@{/login}">Login</a>
                    <a class="btn btn-brand btn-sm" th:href="@{/register}">Create account</a>
                </th:block>

                <th:block th:if="${currentUser != null}">
                    <div class="notification-icon">
                        <button class="notification-icon__button" type="button" data-notification-toggle
                                aria-label="Open notifications" aria-controls="notificationSidebar" aria-expanded="false">
                            <i class="bi bi-bell"></i>
                            <span class="badge bg-danger" id="notificationCount" th:text="${notificationCount}">0</span>
                        </button>
                    </div>
                    <span class="small text-body-secondary d-none d-lg-inline" th:text="${currentUser.displayName}">User</span>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button class="btn btn-outline-dark btn-sm" type="submit">Logout</button>
                    </form>
                </th:block>
            </div>
        </div>
    </nav>
</th:block>
</html>
