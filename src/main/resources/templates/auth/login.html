<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page('Login', ~{::content})}">
<section th:fragment="content" class="auth-page-shell" data-page-mode="auth">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="auth-card">
                <div class="row g-0">
                    <div class="col-lg-5">
                        <div class="auth-card__accent">
                            <span class="eyebrow">Welcome back</span>
                            <h1 class="display-6 mt-4 mb-3">Sign in to the refreshed rental workspace.</h1>
                            <p class="mb-0">Access your account to manage bookings, listings, and profile details securely.</p>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="auth-card__content">
                            <span class="eyebrow">Secure access</span>
                            <h2 class="h3 mt-3">Login</h2>
                            <p class="text-body-secondary">Enter your account details to continue.</p>

                            <form th:action="@{/login}" method="post" class="row g-3 mt-2">
                                <div class="col-12">
                                    <label class="form-label">Username</label>
                                    <input class="form-control" name="username" required>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Password</label>
                                    <div class="password-field">
                                        <input class="form-control" name="password" type="password" placeholder="Enter your password" autocomplete="current-password" required>
                                        <button class="password-toggle" type="button" data-password-toggle aria-label="Show password" aria-pressed="false">
                                            <i class="fa fa-eye" aria-hidden="true"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-6 d-grid">
                                    <button class="btn btn-brand btn-lg" type="submit">Login</button>
                                </div>
                                <div class="col-md-6 d-grid">
                                    <a class="btn btn-soft btn-lg" th:href="@{/register}">Create account</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
