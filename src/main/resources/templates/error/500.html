<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page('Server error', ~{::content})}">
<section th:fragment="content" data-page-mode="marketing">
    <section class="error-panel">
        <span class="eyebrow">500</span>
        <h1 class="display-5 mt-3" th:text="${title}">Unexpected error</h1>
        <p class="lead text-body-secondary" th:text="${message}">An unexpected error occurred.</p>
        <a class="btn btn-brand" th:href="@{/}">Return home</a>
    </section>
</section>
</html>
