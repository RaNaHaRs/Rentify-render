<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: page('Booking requests', ~{::content})}">
<section th:fragment="content" class="page-container" data-page-mode="content">
    <section class="surface-card dashboard-hero my-4 my-lg-5">
        <span class="eyebrow">Landlord workspace</span>
        <h1 class="h2 mt-3 mb-2">Booking requests</h1>
        <p class="text-body-secondary mb-0">Review booking demand, approve eligible stays, and reject requests when needed.</p>
    </section>

    <div class="surface-card p-4 p-lg-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-3">
            <div>
                <h2 class="h4 mb-1">Reservation queue</h2>
                <p class="text-body-secondary mb-0">Incoming requests and their latest status for your properties.</p>
            </div>
            <span class="status-pill status-pill--warning" th:text="${pendingApprovals + ' pending'}">0 pending</span>
        </div>

        <div th:if="${#lists.isEmpty(reservations)}" class="text-body-secondary">No reservations yet.</div>
        <div th:each="reservation : ${reservations}" class="reservation-row"
             th:with="statusText=${reservation.status.toString()}">
            <div>
                <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                    <h3 class="h5 mb-0" th:text="${reservation.roomTitle}">Room title</h3>
                    <span class="status-pill"
                          th:classappend="${statusText == 'APPROVED'} ? ' status-pill--success' : (${statusText == 'PENDING'} ? ' status-pill--warning' : ' status-pill--danger')"
                          th:text="${statusText}">PENDING</span>
                </div>
                <p class="text-body-secondary mb-1" th:text="${reservation.tenantDisplayName + ' | ' + reservation.checkInDate + ' to ' + reservation.checkOutDate}">Tenant details</p>
            </div>
            <div class="d-flex flex-wrap gap-2" th:if="${reservation.status.name() == 'PENDING'}">
                <form th:action="@{'/landlord/reservations/' + ${reservation.id} + '/approve'}" method="post">
                    <button class="btn btn-brand btn-sm" type="submit">Approve</button>
                </form>
                <form th:action="@{/bookings/reject/{id}(id=${reservation.id})}" method="post">
                    <button type="submit"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Reject this booking?')">
                        Reject
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
</html>
