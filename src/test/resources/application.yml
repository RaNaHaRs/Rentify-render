spring:
  datasource:
    url: jdbc:h2:mem:rentify-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

app:
  name: Rentify
  uploads:
    root: target/test-uploads
  bootstrap:
    admin-username: ${TEST_ADMIN_USERNAME:admin}
    admin-password: ${TEST_ADMIN_PASSWORD:testpass}
    landlord-username: ${TEST_LANDLORD_USERNAME:landlord}
    landlord-password: ${TEST_LANDLORD_PASSWORD:testpass}
    tenant-username: ${TEST_TENANT_USERNAME:tenant}
    tenant-password: ${TEST_TENANT_PASSWORD:testpass}
